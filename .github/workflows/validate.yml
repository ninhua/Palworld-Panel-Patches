name: Validate repository

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Validate repository
        run: bash common/scripts/validate-repository.sh

      - name: Test relative build output path
        run: |
          bash projects/uitok-palworld-panel/patches/dev-v1.2.2/tests/test-relative-output-path.sh

      - name: Test stable release automation
        run: |
          bash projects/uitok-palworld-panel/automation/tests/test-automation.sh
