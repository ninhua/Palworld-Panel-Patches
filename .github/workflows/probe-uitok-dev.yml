name: Probe uitok dev source

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "uitok/palworld-panel ref"
        required: true
        default: "dev"
        type: string

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout upstream dev source
        uses: actions/checkout@v6
        with:
          repository: uitok/palworld-panel
          ref: ${{ inputs.upstream_ref }}
          path: .work/upstream
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Probe source layout
        run: |
          bash projects/uitok-palworld-panel/build/probe-upstream.sh \
            .work/upstream \
            .work/report

      - name: Probe Go packages and tests
        continue-on-error: true
        run: |
          bash projects/uitok-palworld-panel/build/collect-build-probe.sh \
            .work/upstream \
            .work/report

      - name: Create deterministic source snapshot
        id: snapshot
        shell: bash
        run: |
          set -Eeuo pipefail

          commit="$(git -C .work/upstream rev-parse HEAD)"
          short="${commit:0:12}"
          archive="uitok-palworld-panel-dev-${short}-source.tar.gz"

          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --sort=name \
            --mtime='UTC 2026-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -C .work/upstream \
            -czf ".work/${archive}" \
            .

          sha="$(sha256sum ".work/${archive}" | awk '{print $1}')"

          python3 - "${archive}" "${sha}" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(".work/report/upstream-lock.generated.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["source_archive"]["filename"] = sys.argv[1]
          data["source_archive"]["sha256"] = sys.argv[2]
          path.write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          printf '%s  %s\n' "${sha}" "${archive}" > .work/report/SHA256SUMS
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "short=${short}" >> "${GITHUB_OUTPUT}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Write job summary
        shell: bash
        run: |
          {
            echo "## uitok dev source probe"
            echo
            echo "- Ref: \`${{ inputs.upstream_ref }}\`"
            echo "- Commit: \`${{ steps.snapshot.outputs.commit }}\`"
            echo "- Target compatibility: \`v1.2.2\`"
            echo "- Artifact: \`uitok-dev-probe-${{ steps.snapshot.outputs.short }}\`"
            echo
            echo "下载 Artifact 后，其中包含完整源码快照和路由/构建分析报告。"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload source and report
        uses: actions/upload-artifact@v7
        with:
          name: uitok-dev-probe-${{ steps.snapshot.outputs.short }}
          path: |
            .work/${{ steps.snapshot.outputs.archive }}
            .work/report/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
