name: Auto release uitok stable patch

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "可选：指定上游稳定版本，例如 v1.3.0；留空则自动选择最高正式 Release"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: auto-release-uitok-stable
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      AUTOMATION_DIR: projects/uitok-palworld-panel/automation

    steps:
      - name: Checkout patch repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up validation Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-ci.txt

      - name: Repository release preflight
        run: bash common/scripts/validate-all.sh

      - name: Read automation configuration
        id: config
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - "${AUTOMATION_DIR}/config.json" >>"${GITHUB_OUTPUT}" <<'PY'
          from pathlib import Path
          import json, sys
          data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if data.get("schema_version") != 2:
              raise SystemExit("automation config schema_version must be 2")
          for key in (
              "upstream_repository",
              "bootstrap_source_track",
              "release_tag_prefix",
              "stable_patch_version",
              "migration_branch_prefix",
          ):
              print(f"{key}={data[key]}")
          PY

      - name: Detect latest stable upstream release
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPOSITORY: ${{ steps.config.outputs.upstream_repository }}
          MANUAL_VERSION: ${{ inputs.upstream_version }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -n "${MANUAL_VERSION:-}" ]]; then
            version="$(printf '%s\n' "${MANUAL_VERSION}" | "${AUTOMATION_DIR}/select-latest-version.py")"
          else
            version="$(
              gh api --paginate \
                -H 'Accept: application/vnd.github+json' \
                "repos/${UPSTREAM_REPOSITORY}/releases?per_page=100" \
                --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name' |
              "${AUTOMATION_DIR}/select-latest-version.py"
            )"
          fi
          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "检测到上游稳定版：${version}"

      - name: Create migration source workspace
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          TAG_PREFIX: ${{ steps.config.outputs.release_tag_prefix }}
          BOOTSTRAP_SOURCE_TRACK: ${{ steps.config.outputs.bootstrap_source_track }}
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf .work
          mkdir -p .work/previous-release

          previous_tag="$(
            gh api --paginate \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name' |
            "${AUTOMATION_DIR}/select-previous-stable-release.py" \
              "${TARGET_VERSION}" \
              "${TAG_PREFIX}"
          )"

          if [[ -n "${previous_tag}" ]]; then
            # Download the complete previous Release. v0.12 Releases have five
            # top-level files; legacy Releases are accepted for one-way migration.
            gh release download "${previous_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --dir .work/previous-release
            "${AUTOMATION_DIR}/prepare-source-track.sh" \
              .work/source-track \
              "${BOOTSTRAP_SOURCE_TRACK}" \
              .work/previous-release \
              "${previous_tag}"
          else
            "${AUTOMATION_DIR}/prepare-source-track.sh" \
              .work/source-track \
              "${BOOTSTRAP_SOURCE_TRACK}"
          fi

          echo "source_track=.work/source-track" >>"${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >>"${GITHUB_OUTPUT}"
          cat .work/source-track/derivation.json

      - name: Resolve patch version and release tag
        id: release_meta
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          PATCH_VERSION: ${{ steps.config.outputs.stable_patch_version }}
          TAG_PREFIX: ${{ steps.config.outputs.release_tag_prefix }}
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "patch_version=${PATCH_VERSION}" >>"${GITHUB_OUTPUT}"
          echo "release_tag=${TAG_PREFIX}${TARGET_VERSION}-p${PATCH_VERSION}" >>"${GITHUB_OUTPUT}"
          echo "artifact_name=uitok-stable-${TARGET_VERSION}-patch-${PATCH_VERSION}" >>"${GITHUB_OUTPUT}"

      - name: Check compatibility blocklist and existing release
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          set -Eeuo pipefail
          blocked_reason="$(
            python3 - "${AUTOMATION_DIR}/incompatible-versions.json" "${TARGET_VERSION}" <<'PY'
          from pathlib import Path
          import json, sys
          data = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          print(data.get("versions", {}).get(sys.argv[2], ""))
          PY
          )"
          if [[ -n "${blocked_reason}" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=explicitly-incompatible" >>"${GITHUB_OUTPUT}"
            echo "明确阻止 ${TARGET_VERSION}: ${blocked_reason}"
            exit 0
          fi
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=already-released" >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "skip=false" >>"${GITHUB_OUTPUT}"
          echo "reason=build-required" >>"${GITHUB_OUTPUT}"

      - name: Reconcile released workspace state
        if: steps.gate.outputs.reason == 'already-released'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        shell: bash
        run: |
          set -Eeuo pipefail
          workspace="projects/uitok-palworld-panel/patches/stable-${TARGET_VERSION}"
          if [[ -f "${workspace}/workspace.json" ]]; then
            python3 "${AUTOMATION_DIR}/workspace-state.py" \
              "${workspace}" released \
              --verified true \
              --release-tag "${RELEASE_TAG}"
            python3 - "${workspace}/compatibility-report.json" <<'PY'
          from pathlib import Path
          import json, sys
          path = Path(sys.argv[1])
          data = json.loads(path.read_text(encoding="utf-8"))
          data["state"] = "released"
          data["verified"] = True
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
            "${AUTOMATION_DIR}/persist-workspace.sh" stable "${workspace}" "${TARGET_VERSION}" \
              "${{ steps.config.outputs.migration_branch_prefix }}"
          fi

      - name: Checkout upstream stable source
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.config.outputs.upstream_repository }}
          ref: ${{ steps.detect.outputs.version }}
          path: .work/upstream
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Set up Go
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: .work/upstream/backend/go.mod
          cache-dependency-path: .work/upstream/backend/go.sum

      - name: Set up Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .work/upstream/frontend/package-lock.json

      # build-stable-release invokes migrate-patch-workspace.py and then clean-room verification.
      # Exit code 20 means no Release is required. Any other non-zero result is
      # recorded as a blocked migration without failing the workflow run.
      - name: Migrate, merge and clean-room test patches
        id: build
        if: steps.gate.outputs.skip != 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          SOURCE_TRACK: ${{ steps.source.outputs.source_track }}
        shell: bash
        run: |
          set -uo pipefail
          set +e
          "${AUTOMATION_DIR}/build-stable-release.sh" \
            .work/upstream \
            .work/output \
            "${TARGET_VERSION}" \
            "${SOURCE_TRACK}"
          status=$?
          set -e

          echo "build_status=${status}" >>"${GITHUB_OUTPUT}"
          if [[ ${status} -eq 20 ]]; then
            echo "no_release=true" >>"${GITHUB_OUTPUT}"
            echo "migration_failed=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ ${status} -ne 0 ]]; then
            echo "no_release=false" >>"${GITHUB_OUTPUT}"
            echo "migration_failed=true" >>"${GITHUB_OUTPUT}"
            echo "稳定补丁迁移被阻断；将记录报告并正常结束 workflow。"
            exit 0
          fi
          echo "no_release=false" >>"${GITHUB_OUTPUT}"
          echo "migration_failed=false" >>"${GITHUB_OUTPUT}"

      - name: Persist blocked candidate workspace
        id: persist_candidate
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed == 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          BRANCH_PREFIX: ${{ steps.config.outputs.migration_branch_prefix }}
        shell: bash
        run: |
          set -uo pipefail
          workspace=".work/output/workspace/candidate-${TARGET_VERSION}"
          branch="${BRANCH_PREFIX}${TARGET_VERSION}"
          echo "branch=${branch}" >>"${GITHUB_OUTPUT}"

          if [[ ! -f "${workspace}/workspace.json" ]]; then
            echo "persisted=false" >>"${GITHUB_OUTPUT}"
            echo "构建在候选工作区创建前失败，无法持久化兼容报告；将继续创建 Issue。"
            exit 0
          fi

          set +e
          "${AUTOMATION_DIR}/persist-workspace.sh" \
            candidate "${workspace}" "${TARGET_VERSION}" "${BRANCH_PREFIX}" \
            2>&1 | tee .work/persist-candidate.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ ${status} -ne 0 ]]; then
            echo "persisted=false" >>"${GITHUB_OUTPUT}"
            echo "candidate 工作区持久化失败（exit=${status}）；错误将写入 Issue。"
            exit 0
          fi
          echo "persisted=true" >>"${GITHUB_OUTPUT}"

      - name: Prepare blocked migration report
        id: migration_report
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed == 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          PATCH_VERSION: ${{ steps.release_meta.outputs.patch_version }}
          CANDIDATE_BRANCH: ${{ steps.persist_candidate.outputs.branch }}
          CANDIDATE_PERSISTED: ${{ steps.persist_candidate.outputs.persisted }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -Eeuo pipefail
          report=".work/output/workspace/candidate-${TARGET_VERSION}/compatibility-report.json"
          python3 "${AUTOMATION_DIR}/migration-tracking.py" \
            --report "${report}" \
            --output-dir .work/migration-tracking \
            --target-version "${TARGET_VERSION}" \
            --patch-version "${PATCH_VERSION}" \
            --branch "${CANDIDATE_BRANCH}" \
            --persisted "${CANDIDATE_PERSISTED}" \
            --run-url "${RUN_URL}" \
            --repository "${GITHUB_REPOSITORY}"
          cat .work/migration-tracking/summary.md >>"${GITHUB_STEP_SUMMARY}"

      - name: Create or update migration Issue and Draft PR
        id: tracking
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          ISSUE_TITLE: ${{ steps.migration_report.outputs.issue_title }}
          PR_TITLE: ${{ steps.migration_report.outputs.pr_title }}
          CANDIDATE_BRANCH: ${{ steps.migration_report.outputs.candidate_branch }}
          CANDIDATE_PERSISTED: ${{ steps.persist_candidate.outputs.persisted }}
        shell: bash
        run: |
          set +e
          issue_body=.work/migration-tracking/issue-body.md
          pr_body=.work/migration-tracking/pr-body.md

          issue_json="$(gh issue list --repo "${GITHUB_REPOSITORY}" --state all --limit 100 --json number,title,state,url 2>/dev/null || printf '[]')"
          printf '%s' "${issue_json}" >.work/migration-tracking/issues.json
          issue_number="$(python3 - "${ISSUE_TITLE}" .work/migration-tracking/issues.json <<'PY'
          import json, sys
          title = sys.argv[1]
          try:
              items = json.load(open(sys.argv[2], encoding="utf-8"))
          except Exception:
              items = []
          for item in items:
              if item.get("title") == title:
                  print(item.get("number", ""))
                  break
          PY
          )"

          issue_url=""
          if [[ -n "${issue_number}" ]]; then
            gh issue reopen "${issue_number}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || true
            gh issue edit "${issue_number}" --repo "${GITHUB_REPOSITORY}" \
              --title "${ISSUE_TITLE}" --body-file "${issue_body}" >/dev/null 2>&1
            issue_url="${{ github.server_url }}/${GITHUB_REPOSITORY}/issues/${issue_number}"
          else
            issue_url="$(gh issue create --repo "${GITHUB_REPOSITORY}" \
              --title "${ISSUE_TITLE}" --body-file "${issue_body}" 2>/dev/null || true)"
            issue_number="${issue_url##*/}"
          fi
          echo "issue_url=${issue_url}" >>"${GITHUB_OUTPUT}"

          pr_url=""
          if [[ "${CANDIDATE_PERSISTED}" == "true" && -n "${CANDIDATE_BRANCH}" ]]; then
            cp "${pr_body}" .work/migration-tracking/pr-body-linked.md
            if [[ -n "${issue_url}" ]]; then
              printf '\nRelated issue: %s\n' "${issue_url}" >>.work/migration-tracking/pr-body-linked.md
            fi

            pr_json="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state all --base main \
              --head "${CANDIDATE_BRANCH}" --limit 100 --json number,state,url,isDraft 2>/dev/null || printf '[]')"
            printf '%s' "${pr_json}" >.work/migration-tracking/prs.json
            pr_number="$(python3 - .work/migration-tracking/prs.json <<'PY'
          import json, sys
          try:
              items = json.load(open(sys.argv[1], encoding="utf-8"))
          except Exception:
              items = []
          if items:
              print(items[0].get("number", ""))
          PY
          )"
            if [[ -n "${pr_number}" ]]; then
              gh pr reopen "${pr_number}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || true
              gh pr edit "${pr_number}" --repo "${GITHUB_REPOSITORY}" \
                --title "${PR_TITLE}" --body-file .work/migration-tracking/pr-body-linked.md >/dev/null 2>&1
              gh pr ready "${pr_number}" --repo "${GITHUB_REPOSITORY}" --undo >/dev/null 2>&1 || true
              pr_url="${{ github.server_url }}/${GITHUB_REPOSITORY}/pull/${pr_number}"
            else
              pr_url="$(gh pr create --repo "${GITHUB_REPOSITORY}" --draft \
                --base main --head "${CANDIDATE_BRANCH}" --title "${PR_TITLE}" \
                --body-file .work/migration-tracking/pr-body-linked.md 2>/dev/null || true)"
            fi
          fi
          echo "pr_url=${pr_url}" >>"${GITHUB_OUTPUT}"

          {
            echo
            echo "### Migration tracking"
            if [[ -n "${issue_url}" ]]; then
              echo "- Issue: ${issue_url}"
            else
              echo "- Issue: creation/update failed; inspect token permissions"
            fi
            if [[ -n "${pr_url}" ]]; then
              echo "- Draft PR: ${pr_url}"
            elif [[ "${CANDIDATE_PERSISTED}" == "true" ]]; then
              echo "- Draft PR: creation/update failed; enable Actions PR creation in repository settings"
            else
              echo "- Draft PR: skipped because candidate persistence failed"
            fi
          } >>"${GITHUB_STEP_SUMMARY}"
          exit 0

      - name: Persist no-change candidate workspace
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release == 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          BRANCH_PREFIX: ${{ steps.config.outputs.migration_branch_prefix }}
        shell: bash
        run: |
          set -Eeuo pipefail
          "${AUTOMATION_DIR}/persist-workspace.sh" \
            candidate ".work/output/workspace/candidate-${TARGET_VERSION}" \
            "${TARGET_VERSION}" "${BRANCH_PREFIX}"

      - name: Write no-release summary
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release == 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
        shell: bash
        run: |
          {
            echo "## Stable patch not required"
            echo
            echo "- Target: \`${TARGET_VERSION}\`"
            echo "- Result: \`no-release-needed\`"
            echo "- Reason: patch chain produced no source delta"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Verify five-file release allowlist
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          cd .work/output/release
          sha256sum -c SHA256SUMS
          test -s manifest.json
          test -s compatibility-report.json
          test "$(find . -maxdepth 1 -type f | wc -l)" -eq 5
          test "$(find . -maxdepth 1 -type f -name '*_linux-amd64.tar.gz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -type f -name '*_source.tar.gz' | wc -l)" -eq 1
          python3 - <<'PY'
          from pathlib import Path
          import json
          manifest = json.loads(Path("manifest.json").read_text(encoding="utf-8"))
          report = json.loads(Path("compatibility-report.json").read_text(encoding="utf-8"))
          assert manifest["compatibility"]["mode"] == "exact"
          assert manifest["compatibility"]["verified"] is True
          assert report["state"] == "releasable"
          assert report["verified"] is True
          PY

      - name: Create release notes
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          PATCH_VERSION: ${{ steps.release_meta.outputs.patch_version }}
          PREVIOUS_TAG: ${{ steps.source.outputs.previous_tag }}
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - \
            .work/output/release/manifest.json \
            .work/output/release/compatibility-report.json \
            .work/release-notes.md \
            "${PREVIOUS_TAG}" <<'PY'
          from pathlib import Path
          import json, sys
          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          report = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          previous = sys.argv[4] or "bootstrap track"
          features = "\n".join(f"- `{item}`" for item in manifest["features"])
          counts = report.get("summary", {})
          text = f"""## PalPanel {manifest['compatibility']['target_version']} stable patch

          Derived from: `{previous}`

          Compatibility:
          - Mode: `exact`
          - Verified: `true`
          - Compatible patches: `{counts.get('compatible', 0)}`
          - Adapted patches: `{counts.get('adapted', 0)}`
          - Incompatible required patches: `0`
          - Clean-room merged-patch verification: `passed`

          Features:
          {features}

          The Release exposes only the binary package, corresponding source package,
          manifest, compatibility report and SHA256SUMS. The complete patch chain,
          merged patch, build metadata and logs are retained inside the packages.
          """
          Path(sys.argv[3]).write_text(text, encoding="utf-8")
          PY

      - name: Upload verified build artifact
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release_meta.outputs.artifact_name }}
          path: .work/output/release/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Persist releasable stable workspace
        id: persist
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          BRANCH_PREFIX: ${{ steps.config.outputs.migration_branch_prefix }}
        shell: bash
        run: |
          set -Eeuo pipefail
          "${AUTOMATION_DIR}/persist-workspace.sh" \
            stable ".work/output/workspace/stable-${TARGET_VERSION}" \
            "${TARGET_VERSION}" "${BRANCH_PREFIX}"

      - name: Create immutable stable Release
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          PATCH_VERSION: ${{ steps.release_meta.outputs.patch_version }}
          RELEASE_TARGET: ${{ steps.persist.outputs.commit }}
        shell: bash
        run: |
          set -Eeuo pipefail
          cd .work/output/release
          binary="$(find . -maxdepth 1 -type f -name '*_linux-amd64.tar.gz' -printf '%f\n')"
          source="$(find . -maxdepth 1 -type f -name '*_source.tar.gz' -printf '%f\n')"
          gh release create "${RELEASE_TAG}" \
            "${binary}" \
            "${source}" \
            manifest.json \
            compatibility-report.json \
            SHA256SUMS \
            --target "${RELEASE_TARGET}" \
            --title "PalPanel ${TARGET_VERSION} stable patch ${PATCH_VERSION}" \
            --notes-file ../../release-notes.md \
            --repo "${GITHUB_REPOSITORY}"

      - name: Mark stable workspace released
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        env:
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          BRANCH_PREFIX: ${{ steps.config.outputs.migration_branch_prefix }}
        shell: bash
        run: |
          set -Eeuo pipefail
          workspace=".work/output/workspace/stable-${TARGET_VERSION}"
          python3 "${AUTOMATION_DIR}/workspace-state.py" \
            "${workspace}" released \
            --verified true \
            --release-tag "${RELEASE_TAG}"
          python3 - "${workspace}/compatibility-report.json" <<'PY'
          from pathlib import Path
          import json, sys
          path = Path(sys.argv[1])
          data = json.loads(path.read_text(encoding="utf-8"))
          data["state"] = "released"
          data["verified"] = True
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          "${AUTOMATION_DIR}/persist-workspace.sh" \
            stable "${workspace}" "${TARGET_VERSION}" "${BRANCH_PREFIX}"

      - name: Write release summary
        if: steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true' && steps.build.outputs.no_release != 'true'
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          PATCH_VERSION: ${{ steps.release_meta.outputs.patch_version }}
        shell: bash
        run: |
          {
            echo "## Stable patch published"
            echo
            echo "- Target: \`${TARGET_VERSION}\`"
            echo "- Patch: \`${PATCH_VERSION}\`"
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Release assets: 5"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Resolve completed migration tracking
        if: success() && (steps.gate.outputs.reason == 'already-released' || (steps.gate.outputs.skip != 'true' && steps.build.outputs.migration_failed != 'true'))
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_VERSION: ${{ steps.detect.outputs.version }}
          PATCH_VERSION: ${{ steps.release_meta.outputs.patch_version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          BRANCH_PREFIX: ${{ steps.config.outputs.migration_branch_prefix }}
          NO_RELEASE: ${{ steps.build.outputs.no_release }}
        shell: bash
        run: |
          set +e
          issue_title="[PalPanel ${TARGET_VERSION}] stable patch migration blocked"
          branch="${BRANCH_PREFIX}${TARGET_VERSION}"

          if [[ "${{ steps.gate.outputs.reason }}" == "already-released" ]]; then
            resolution="Release ${RELEASE_TAG} already exists."
          elif [[ "${NO_RELEASE}" == "true" ]]; then
            resolution="Migration completed with no source delta; no Release is required."
          else
            resolution="Release ${RELEASE_TAG} was published successfully."
          fi

          issue_json="$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open --limit 100 --json number,title 2>/dev/null || printf '[]')"
          mkdir -p .work/migration-tracking
          printf '%s' "${issue_json}" >.work/migration-tracking/open-issues.json
          issue_number="$(python3 - "${issue_title}" .work/migration-tracking/open-issues.json <<'PY'
          import json, sys
          title = sys.argv[1]
          try:
              items = json.load(open(sys.argv[2], encoding="utf-8"))
          except Exception:
              items = []
          for item in items:
              if item.get("title") == title:
                  print(item.get("number", ""))
                  break
          PY
          )"
          if [[ -n "${issue_number}" ]]; then
            gh issue close "${issue_number}" --repo "${GITHUB_REPOSITORY}" \
              --comment "${resolution}" >/dev/null 2>&1 || true
          fi

          pr_json="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open --base main \
            --head "${branch}" --limit 100 --json number 2>/dev/null || printf '[]')"
          printf '%s' "${pr_json}" >.work/migration-tracking/open-prs.json
          pr_number="$(python3 - .work/migration-tracking/open-prs.json <<'PY'
          import json, sys
          try:
              items = json.load(open(sys.argv[1], encoding="utf-8"))
          except Exception:
              items = []
          if items:
              print(items[0].get("number", ""))
          PY
          )"
          if [[ -n "${pr_number}" ]]; then
            gh pr close "${pr_number}" --repo "${GITHUB_REPOSITORY}" \
              --comment "${resolution}" >/dev/null 2>&1 || true
          fi
          exit 0

