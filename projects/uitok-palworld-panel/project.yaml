name: uitok-palworld-panel
role: patch-target
upstream_repository: uitok/palworld-panel
runtime: go-react
patch_type: source-build

compatibility:
  exact_upstream_commit: true
  verify_original_sha256: true
  allow_version_downgrade: false

artifacts:
  linux_amd64:
    panel: bin/palpanel
    save_cli: bin/sav-cli
    palcalc_bridge: bin/palcalc-bridge
